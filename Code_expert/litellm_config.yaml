# ──────────────────────────────────────────────
# LiteLLM Proxy Configuration for ZipFix Agent
# ──────────────────────────────────────────────
# Exposes Anthropic-compatible endpoints on localhost:4000
# and forwards real inference to a local Ollama coding model.
# ──────────────────────────────────────────────

model_list:
  - model_name: local-claude-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:3b
      api_base: http://localhost:11434
      keep_alive: "30m"
      think: false
      num_ctx: 32768
      num_predict: 100000
      temperature: 0
    model_info:
      supports_function_calling: true

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
